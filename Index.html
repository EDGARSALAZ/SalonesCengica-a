<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body, html { 
    height: 100%; 
    margin: 0;
    /* Imagen con opacidad total (sin filtro oscuro) */
    background: url('https://www.dropbox.com/scl/fi/smf9u5kmpbqaqeklkexdh/Fotografia-CG.png?rlkey=vbiip47tnqvgrwgjiuipo5ehw&st=g57rzy8l&dl=1') no-repeat center center fixed;
    background-size: cover;
  }

  #rooms {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    grid-auto-rows: 1fr;
    gap: 24px;
  }

  .card {
    display: flex;
    flex-direction: column;
    min-height: 350px;
    padding: 24px !important;
    font-size: 20px;
    /* Fondo blanco sólido para legibilidad sobre fondo brillante */
    background: rgba(255, 255, 255, 1); 
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  .banner-header {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 4px solid #16a34a; /* Verde CENGICAÑA más marcado */
  }

  .event { padding: 14px !important; margin-bottom: 12px; }
  h2 { font-size: 32px !important; color: #1f2937; }
  .estado-tag { font-size: 18px !important; padding: 4px 16px !important; }
  .hora { font-size: 22px !important; font-weight: bold; }
  .titulo-evento { font-size: 20px !important; font-weight: 600; }

  #clock {
    font-family: 'Courier New', Courier, monospace;
    font-size: 52px;
    font-weight: 900;
    color: #111;
    line-height: 1;
  }
</style>
</head>

<body class="w-full h-full flex flex-col">

<header class="banner-header w-full px-10 py-5 flex justify-between items-center shadow-2xl">
  <div>
    <img src="https://www.dropbox.com/scl/fi/pa1evz6vvcqq1ync38akw/cengica-a-2-1.png?rlkey=3a4bu71ogkws17ys58mizkq5n&st=detii6mv&dl=1" 
         alt="Logo CENGICAÑA"
         class="w-72">
  </div>

  <div class="text-center">
    <h1 id="titulo-fecha" class="text-3xl font-black text-gray-800 uppercase tracking-tighter"></h1>
  </div>

  <div class="text-right">
    <div id="clock">00:00:00</div>
    <div class="text-green-700 font-bold uppercase text-xs tracking-widest mt-1">Hora Local Guatemala</div>
  </div>
</header>

<main class="flex-1 w-full p-10 overflow-auto">
  <div id="rooms"></div>
</main>

<script>
  const JSON_URL = "https://gist.githubusercontent.com/EDGARSALAZ/8621de8698e6fdd6189c57aa150f9080/raw/Salones.json";

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('es-GT', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  function formatFecha(f){
    const partes = f.split("-");
    const d = new Date(partes[0], partes[1] - 1, partes[2]);
    const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
    const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    return dias[d.getDay()] + ", " + d.getDate() + " de " + meses[d.getMonth()];
  }

  function crearFechaHora(fechaStr, horaStr){
    const [anio,mes,dia]=fechaStr.split("-").map(Number);
    const [h,m]=horaStr.split(":").map(Number);
    return new Date(anio, mes-1, dia, h, m, 0);
  }

  async function cargar(){
    try{
      const res = await fetch(JSON_URL);
      const data = await res.json();
      const roomsContainer = document.getElementById("rooms");

      document.getElementById("titulo-fecha").textContent = formatFecha(data.fecha);
      roomsContainer.innerHTML = "";

      const ahoraReal = new Date();
      const [anio, mes, dia] = data.fecha.split("-").map(Number);
      const fechaBase = new Date(anio, mes - 1, dia);

      data.salas.forEach(salon => {
        const eventos = (salon.eventos || []).filter(e => {
            return ahoraReal < crearFechaHora(data.fecha, e.fin);
        });

        const eventosProcesados = eventos.map(e => {
          const inicio = crearFechaHora(data.fecha, e.inicio);
          const fin = crearFechaHora(data.fecha, e.fin);
          return { ...e, enCurso: ahoraReal >= inicio && ahoraReal < fin };
        });

        const ocupado = eventosProcesados.some(ev => ev.enCurso);
        const colorBorder = ocupado ? "border-blue-600" : "border-green-500";
        const tagBg = ocupado ? "bg-blue-600" : "bg-green-500";

        let htmlEventos = eventosProcesados.length === 0 
          ? `<p class="text-gray-400 italic mt-6">No hay más eventos hoy.</p>`
          : eventosProcesados.map(e => `
            <div class="event bg-gray-50 rounded-xl border-l-8 ${e.enCurso ? "border-red-600 shadow-md" : "border-blue-400"} shadow-sm">
              <p class="hora ${e.enCurso ? "text-red-700" : "text-gray-600"}">${e.inicio} - ${e.fin}</p>
              <p class="titulo-evento text-gray-900">${e.titulo}</p>
            </div>
          `).join("");

        roomsContainer.innerHTML += `
          <div class="card rounded-3xl border-t-8 ${colorBorder}">
            <div class="flex justify-between items-start mb-6">
              <h2 class="font-black tracking-tight">${salon.nombre}</h2>
              <span class="estado-tag text-white font-black rounded-xl ${tagBg}">${ocupado ? 'OCUPADO' : 'LIBRE'}</span>
            </div>
            <div class="flex-1">
              ${htmlEventos}
            </div>
          </div>
        `;
      });
    } catch(e) { console.error(e); }
  }

  cargar();
  setInterval(cargar, 60000);
</script>
</body>
</html>
